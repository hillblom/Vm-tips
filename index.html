<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM-Tips 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>VM-Tips 2026</h1>
        <div id="lastUpdated" style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;"></div>

        <div class="main-tabs">
            <button id="btn-matches" class="tab-btn active">Matcher</button>
            <button id="btn-ranking" class="tab-btn">Tabell</button>
            <button id="btn-matrix" class="tab-btn">Matris</button>
            <button id="btn-rules" class="tab-btn" style="margin-left: auto;">Regler</button>
        </div>

        <div class="user-selector-container">
            <span class="selector-label">Deltagare:</span>
            <div id="user-buttons" class="user-buttons">
                </div>
        </div>

        <hr>

        <div id="view-matches" class="tab-content">
            <h2>Dina Tips & Resultat</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>Datum & TV</th>
                        <th>Match</th>
                        <th>Resultat</th>
                        <th>Ditt tips</th>
                        <th>Poäng</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="matches"></tbody>
            </table>
        </div>

        <div id="view-ranking" class="tab-content hidden">
            <h2>Total Ranking</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">Pos</th>
                        <th>Namn</th>
                        <th>Totalt</th>
                        <th style="width: 70px; text-align: center;">12p</th>
                        <th style="width: 70px; text-align: center;">0p</th>
                    </tr>
                </thead>
                <tbody id="ranking-list"></tbody>
            </table>
        </div>

        <div id="view-matrix" class="tab-content hidden">
            <h2>Tipsmatris</h2>
            <div class="matrix-wrapper">
                <table class="ranking-table">
                    <thead>
                        <tr id="matrix-header"></tr>
                    </thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="rules-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Regler & Poängfördelning</h2>
            <p>Exakt resultat ger 12p.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
