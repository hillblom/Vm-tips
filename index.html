<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM-Tips 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>VM-Tips 2026</h1>

        <div class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('matcher')">Matcher</button>
            <button class="tab-btn" onclick="switchTab('tabell')">Tabell</button>
            <button class="tab-btn" onclick="switchTab('matris')">Matris</button>
        </div>

        <div class="user-selector-container">
            <span class="selector-label">Deltagare:</span>
            <div id="userButtons" class="user-buttons">
                </div>
        </div>

        <hr>

        <div id="matcherSection" class="tab-content active">
            <h2>Dina Tips & Resultat</h2>
            <div id="matchList"></div>
        </div>

        <div id="tabellSection" class="tab-content">
            <h2>Total Ranking</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">Pos</th>
                        <th>Namn</th>
                        <th>Totalt</th>
                        <th style="width: 70px;">12p</th>
                        <th style="width: 70px;">0p</th>
                    </tr>
                </thead>
                <tbody id="rankingBody">
                    </tbody>
            </table>
        </div>

        <div id="matrisSection" class="tab-content">
            <h2>Tipsmatris</h2>
            <div class="matrix-wrapper">
                <table id="matrixTable">
                    </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
